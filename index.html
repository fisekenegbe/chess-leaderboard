<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIBEN Chess Enthusiasts Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="leaderboard-panel">
        
        <div class="leaderboard-header">
            <div>
                <div style="color: var(--gold); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px;">Uniben Chess Enthusiasts</div>
                <h1 style="margin: 0;">🏆 Live Rapid Rankings</h1>
            </div>
            <div class="update-status">
                <div class="status-pulse"></div>
                <span>Loading rankings...</span> 
            </div>
        </div>

        <div class="podium-container"></div>

        <div class="roster-list"></div>

        <div style="text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--panel-border); color: var(--text-secondary); font-size: 0.85rem;">
            Developed by <span style="color: var(--text-primary); font-weight: 600;">Fisekenegbe</span>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
